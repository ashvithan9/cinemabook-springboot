<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Booking Detail — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--bg:#080808;--card:#111;--bd:#1e1e1e;--mu:#555;--li:#aaa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
nav{display:flex;align-items:center;padding:0 40px;height:62px;background:#080808f0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:7px;text-decoration:none;margin-right:auto}
.lb{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 6px;border-radius:3px}
.lt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em;color:#fff}
.nl{font-size:13px;color:var(--li);padding:7px 12px;border-radius:6px;text-decoration:none}
.nl:hover{color:#fff}
.nr{display:flex;align-items:center;gap:10px;margin-left:20px}
.lo{font-size:12px;color:var(--mu);padding:5px 10px;border:1px solid var(--bd);border-radius:6px;text-decoration:none}
.lo:hover{border-color:#444;color:var(--li)}
.wp{max-width:520px;margin:50px auto;padding:0 24px}
.bk{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--mu);text-decoration:none;margin-bottom:20px;transition:color .15s}
.bk:hover{color:var(--gold)}
.ticket{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.t-top{padding:24px;border-bottom:1px solid var(--bd);text-align:center;position:relative}
.t-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.t-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px}
.t-conf{background:#081008;border:2px solid #4ade8033}
.t-canc{background:#100808;border:2px solid #e84a4a33}
.t-movie{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;margin-bottom:6px}
.t-amount{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);letter-spacing:.04em;margin-bottom:8px}
.bge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.bc{background:#081008;color:#4ade80;border:1px solid #4ade8033}
.bn{background:#1a0808;color:#e84a4a;border:1px solid #e84a4a33}
.t-body{padding:20px 24px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #111}
.row:last-child{border-bottom:none}
.rk{font-size:12px;color:var(--mu)}
.rv{font-size:13px;color:var(--li);font-weight:500;text-align:right}
.rv.mono{font-family:monospace;font-size:11px;color:var(--mu)}
.t-footer{padding:16px 24px;background:#0a0a0a;display:flex;gap:8px}
.bo{background:transparent;color:var(--li);border:1px solid #2a2a2a;padding:9px 18px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.bo:hover{border-color:#444}
.bd{background:transparent;color:#e84a4a;border:1px solid #e84a4a44;padding:9px 16px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.bd:hover{background:#100808}
footer{border-top:1px solid var(--bd);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:60px}
.fl{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.12em;color:var(--mu)}
.fl span{color:var(--gold)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="lb">CINEMA</span><span class="lt">BOOK</span></a>
  <div style="display:flex;align-items:center;gap:2px">
    <a href="/bookings/my" class="nl">← My Bookings</a>
  </div>
  <div class="nr"><a href="/logout" class="lo">Logout</a></div>
</nav>

<div class="wp">
  <a th:href="${userRole=='ADMIN'} ? '/bookings' : '/bookings/my'" class="bk">← Bookings</a>

  <div class="ticket" th:if="${booking!=null}">
    <div class="t-top">
      <div th:class="${booking.status=='CONFIRMED'} ? 't-icon t-conf' : 't-icon t-canc'">🎟</div>
      <div class="t-movie" th:text="${booking.movieTitle}">Movie</div>
      <div class="t-amount" th:text="'$'+${booking.totalAmount}">$0.00</div>
      <span th:class="${booking.status=='CONFIRMED'} ? 'bge bc' : 'bge bn'" th:text="${booking.status}">STATUS</span>
    </div>

    <div class="t-body">
      <div class="row">
        <span class="rk">Booking ID</span>
        <span class="rv mono" th:text="${booking.bookingId}">—</span>
      </div>
      <div class="row" th:if="${userRole=='ADMIN'}">
        <span class="rk">User ID</span>
        <span class="rv mono" th:text="${booking.userId}">—</span>
      </div>
      <div class="row">
        <span class="rk">Date &amp; Time</span>
        <span class="rv" th:text="${booking.showDate}+' at '+${booking.showTime}">—</span>
      </div>
      <div class="row">
        <span class="rk">Hall</span>
        <span class="rv" th:text="${booking.hall}">—</span>
      </div>
      <div class="row">
        <span class="rk">Seats booked</span>
        <span class="rv" th:text="${booking.seats}">—</span>
      </div>
      <div class="row">
        <span class="rk">Booked on</span>
        <span class="rv" th:text="${booking.bookingDate}">—</span>
      </div>
    </div>

    <div class="t-footer">
      <a th:href="${userRole=='ADMIN'} ? '/bookings' : '/bookings/my'" class="bo">← Back</a>
      <form th:if="${booking.status=='CONFIRMED'}"
            th:action="@{/bookings/{id}/cancel(id=${booking.bookingId})}" method="post"
            onsubmit="return confirm('Cancel this booking?')">
        <button type="submit" class="bd">Cancel booking</button>
      </form>
      <form th:if="${userRole=='ADMIN'}"
            th:action="@{/bookings/{id}/delete(id=${booking.bookingId})}" method="post"
            onsubmit="return confirm('Delete?')">
        <button type="submit" class="bd">Delete</button>
      </form>
    </div>
  </div>

  <div th:if="${booking==null}" style="text-align:center;padding:60px;color:var(--mu)">Booking not found.</div>
</div>

<footer><div class="fl"><span>CINEMA</span>BOOK</div><div style="font-size:11px;color:#333">SE1020 — OOP Project</div></footer>
</body>
</html>
