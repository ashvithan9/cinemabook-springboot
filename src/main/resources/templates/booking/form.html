<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book a Ticket - CinemaBook</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            red: '#e8192c',
                            darkred: '#b01020',
                            black: '#0a0a0a',
                            card: '#111111',
                            border: '#2a2a2a',
                            muted: '#555555',
                            light: '#c8c8c8',
                        }
                    },
                    fontFamily: {
                        display: ['Bebas Neue', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: #c8c8c8;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        header {
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #e8192c, transparent);
        }

        .logo-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
        }

        .logo-accent { color: #e8192c; }

        .logo-sub {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
            margin-top: 1px;
        }

        .admin-badge {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-name {
            font-size: 13px;
            color: #888;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .nav-btn:hover {
            border-color: #e8192c;
            color: #e8192c;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #555555;
            margin-bottom: 24px;
            margin-top: 40px;
        }

        .form-container {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 32px;
            position: relative;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #e8192c, transparent);
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            background-color: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #0a0a0a;
            border-color: #e8192c;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(232, 25, 44, 0.25);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-primary-custom:hover {
            box-shadow: 0 4px 15px rgba(232, 25, 44, 0.4);
            color: white;
            transform: translateY(-1px);
        }

        .price-summary {
            background: rgba(232, 25, 44, 0.05);
            border: 1px dashed rgba(232, 25, 44, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #2ecc71;
            letter-spacing: 1px;
        }
    </style>
</head>
<body style="position: relative; z-index: 1;">

<header class="px-6 py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div>
            <a href="/" class="logo-title">Cinema<span class="logo-accent">Book</span></a>
            <div class="logo-sub">Cinema Booking System</div>
        </div>
        <div class="flex items-center gap-4">
            <span class="user-name" th:text="${userName}"></span>
            <a href="/bookings/my" class="nav-btn">My Bookings</a>
            <a href="/" class="nav-btn">Dashboard</a>
        </div>
    </div>
</header>

<div class="max-w-xl mx-auto px-4 pb-16" style="position: relative; z-index: 1;">

    <div class="section-label">Book a Ticket</div>
    
    <div class="form-container">
        <form th:action="@{/bookings}" th:object="${booking}" method="post">
            
            <input type="hidden" th:field="*{userId}" />
            <input type="hidden" th:field="*{movieId}" value="M_MOCK" />
            
            <div class="mb-4">
                <label class="form-label">Select Movie</label>
                <select class="form-select" th:field="*{movieTitle}" required>
                    <option value="" disabled selected>Choose a movie...</option>
                    <option value="Dune: Part Two">Dune: Part Two</option>
                    <option value="Deadpool & Wolverine">Deadpool & Wolverine</option>
                    <option value="Furiosa: A Mad Max Saga">Furiosa: A Mad Max Saga</option>
                    <option value="Inside Out 2">Inside Out 2</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Showtime</label>
                <select class="form-select" th:field="*{showTime}" required>
                    <option value="" disabled selected>Choose a time...</option>
                    <option value="Today - 18:00">Today - 18:00</option>
                    <option value="Today - 21:00">Today - 21:00</option>
                    <option value="Tomorrow - 15:00">Tomorrow - 15:00</option>
                    <option value="Tomorrow - 18:00">Tomorrow - 18:00</option>
                </select>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">Number of Seats</label>
                    <input type="number" class="form-control" th:field="*{seats}" id="seatCount" min="1" max="10" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Seat Preference (Optional)</label>
                    <input type="text" class="form-control" th:field="*{seatNumbers}" placeholder="e.g. A1, A2">
                </div>
            </div>
            
            <div class="price-summary">
                <div class="price-label">Total Amount<br><span style="font-size: 10px; color: #555;">($10.00 per ticket)</span></div>
                <div class="price-value" id="totalPriceDisplay">$10.00</div>
            </div>
            
            <button type="submit" class="btn-primary-custom">Confirm Booking</button>
        </form>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const seatInput = document.getElementById('seatCount');
        const priceDisplay = document.getElementById('totalPriceDisplay');
        const pricePerSeat = 10.0;
        
        function updatePrice() {
            const seats = parseInt(seatInput.value) || 0;
            const total = seats * pricePerSeat;
            priceDisplay.textContent = '$' + total.toFixed(2);
        }
        
        seatInput.addEventListener('input', updatePrice);
        seatInput.addEventListener('change', updatePrice);
        
        // Initial calc
        updatePrice();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
