<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Detail - CinemaBook</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            red: '#e8192c',
                            darkred: '#b01020',
                            black: '#0a0a0a',
                            card: '#111111',
                            border: '#2a2a2a',
                            muted: '#555555',
                            light: '#c8c8c8',
                        }
                    },
                    fontFamily: {
                        display: ['Bebas Neue', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: #c8c8c8;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        header {
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #e8192c, transparent);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: white;
        }

        .logo-accent { color: #e8192c; }

        .nav-link-home {
            color: #c8c8c8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .nav-link-home:hover { color: #e8192c; }

        .nav-link-cinema {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link-cinema:hover { color: #e8192c; }

        .card-cinema {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .card-cinema::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e8192c, #b01020);
        }

        .reel-decoration {
            position: absolute;
            right: -30px;
            bottom: -30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #1e1e1e;
            opacity: 0.35;
            pointer-events: none;
        }
        .reel-decoration::after {
            content: '';
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            border: 2px solid #1e1e1e;
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: white;
        }

        .field-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
        }

        .field-value {
            font-size: 15px;
            color: #e0e0e0;
            margin-top: 4px;
        }

        .field-divider {
            border-color: #1e1e1e;
        }

        .badge-admin {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 4px 14px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .badge-customer {
            background: transparent;
            border: 1px solid #e8192c;
            color: #e8192c;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 4px 14px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .btn-edit {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(232, 25, 44, 0.25);
        }
        .btn-edit:hover {
            background: linear-gradient(135deg, #ff2d42, #e8192c);
            color: white;
            box-shadow: 0 4px 20px rgba(232, 25, 44, 0.45);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: transparent;
            color: #888;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s ease;
        }
        .btn-danger:hover {
            background: #1a0a0a;
            border-color: #e8192c;
            color: #e8192c;
        }
    </style>
</head>
<body style="position: relative; z-index: 1;">

<!-- Header -->
<header class="px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span class="logo-text">🎬 Cinema<span class="logo-accent">Book</span></span>
        <div class="flex gap-6 items-center">
            <a href="/" class="nav-link-home">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Home
            </a>
            <a href="/logout" class="nav-link-cinema">Logout</a>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="flex items-start justify-center px-4 py-14" style="min-height: calc(100vh - 65px);">
    <div class="w-full" style="max-width: 480px;">

        <div class="card-cinema p-8" style="position: relative;">
            <div class="reel-decoration"></div>

            <h1 class="card-title mb-8">User Details</h1>

            <div class="space-y-0">

                <div class="py-4 border-b field-divider">
                    <div class="field-label">User ID</div>
                    <div class="field-value" th:text="${user.userId}"></div>
                </div>

                <div class="py-4 border-b field-divider">
                    <div class="field-label">Name</div>
                    <div class="field-value" th:text="${user.name}"></div>
                </div>

                <div class="py-4 border-b field-divider">
                    <div class="field-label">Email</div>
                    <div class="field-value" th:text="${user.email}"></div>
                </div>

                <div class="py-4 border-b field-divider">
                    <div class="field-label">Phone</div>
                    <div class="field-value" th:text="${user.phone}"></div>
                </div>

                <div class="py-4">
                    <div class="field-label mb-2">Role</div>
                    <span th:classappend="${user.role == 'ADMIN'} ? 'badge-admin' : 'badge-customer'"
                          class="badge" th:text="${user.role}"></span>
                </div>

            </div>

            <div class="flex gap-3 mt-8">
                <a th:href="@{/users/{id}/edit(id=${user.userId})}" class="btn-edit">Edit</a>
                <form th:action="@{/users/{id}/delete(id=${user.userId})}" method="post"
                      onsubmit="return confirm('Are you sure you want to delete this user?')">
                    <button type="submit" class="btn-danger">Delete</button>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
