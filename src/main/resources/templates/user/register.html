<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--bg:#080808;--border:#1e1e1e;--muted:#555}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.split{display:flex;width:100%;min-height:100vh}
.left{flex:1;background:#0d0900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.left-orb{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#C9A84C12 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.left-title{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:.05em;line-height:.9;text-align:center;position:relative;z-index:1}
.left-title span{color:var(--gold)}
.left-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:16px;letter-spacing:.05em;position:relative;z-index:1}
.steps{margin-top:40px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;width:220px}
.step{display:flex;align-items:center;gap:12px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-txt{font-size:12px;color:var(--muted)}
.right{width:460px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 48px}
.form-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.15em;margin-bottom:28px;display:flex;align-items:center;gap:8px}
.form-logo-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:.1em}
.form-title{font-size:22px;font-weight:500;margin-bottom:6px}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lbl{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px}
.lbl:first-of-type{margin-top:0}
.inp{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:11px 14px;font-size:14px;color:#e0e0e0;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C1a}
.inp::placeholder{color:#333}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;padding:13px;border-radius:7px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:20px;letter-spacing:.02em;transition:background .2s}
.btn-gold:hover{background:#d4b560}
.alert-err{background:#1a0a0a;border:1px solid #e84a4a44;color:#e84a4a;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.foot{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.foot a{color:var(--gold);text-decoration:none;font-weight:500}
@media(max-width:700px){.left{display:none}.right{width:100%;padding:40px 24px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="left-orb"></div>
    <div class="left-title">Join<br><span>Cinema</span><br>Book</div>
    <div class="left-sub">Create your account in 30 seconds.</div>
    <div class="steps">
      <div class="step"><div class="step-num">1</div><span class="step-txt">Fill in your details</span></div>
      <div class="step"><div class="step-num">2</div><span class="step-txt">Verify your email</span></div>
      <div class="step"><div class="step-num">3</div><span class="step-txt">Book your first movie</span></div>
    </div>
  </div>
  <div class="right">
    <div class="form-logo"><span class="form-logo-badge">CINEMA</span>BOOK</div>
    <div class="form-title">Create account</div>
    <div class="form-sub">Fill in the details below to get started.</div>

    <div th:if="${error}" class="alert-err" th:text="${error}"></div>

    <form method="post" action="/register" th:object="${user}" style="width:100%">
      <div class="grid2">
        <div>
          <label class="lbl">Full name</label>
          <input class="inp" type="text" th:field="*{name}" placeholder="John Doe" required/>
        </div>
        <div>
          <label class="lbl">Phone</label>
          <input class="inp" type="text" th:field="*{phone}" placeholder="0771234567" required/>
        </div>
      </div>
      <label class="lbl">Email</label>
      <input class="inp" type="email" th:field="*{email}" placeholder="you@example.com" required/>
      <label class="lbl">Password</label>
      <input class="inp" type="password" th:field="*{password}" placeholder="••••••••" required/>
      <button type="submit" class="btn-gold">Create account</button>
    </form>

    <div class="foot">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
</body>
</html>
