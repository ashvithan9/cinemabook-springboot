<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>User Form — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--bg:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--light:#aaa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
nav{display:flex;align-items:center;padding:0 48px;height:64px;background:#080808ee;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:auto}
.logo-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:.1em}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.15em;color:#fff}
.nav-link{font-size:13px;color:var(--light);padding:8px 14px;border-radius:6px;text-decoration:none;transition:color .2s}
.nav-link:hover{color:#fff}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:24px}
.nav-logout{font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:6px;text-decoration:none}
.nav-logout:hover{border-color:#444;color:var(--light)}
.wrap{max-width:520px;margin:60px auto;padding:0 24px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .2s}
.back:hover{color:var(--gold)}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.05em;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.lbl{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:18px}
.lbl:first-of-type{margin-top:0}
.inp{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:11px 14px;font-size:14px;color:#e0e0e0;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C1a}
.inp::placeholder{color:#333}
select.inp option{background:#111;color:#e0e0e0}
.err-msg{font-size:11px;color:#e84a4a;margin-top:4px;display:none}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;padding:13px;border-radius:7px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:24px;transition:background .2s}
.btn-gold:hover{background:#d4b560}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="logo-badge">CINEMA</span><span class="logo-text">BOOK</span></a>
  <div style="display:flex;align-items:center;gap:2px">
    <a href="/users" class="nav-link">← Back to users</a>
  </div>
  <div class="nav-right">
    <a href="/logout" class="nav-logout">Logout</a>
  </div>
</nav>

<div class="wrap">
  <a href="/users" class="back">← Users</a>
  <div class="page-title" th:text="${isEdit} ? 'Edit User' : 'New User'">New User</div>

  <div class="card">
    <form th:action="${isEdit} ? @{/users/{id}/edit(id=${user.userId})} : @{/users}"
          th:object="${user}" method="post" id="uForm">

      <label class="lbl">Full name</label>
      <input class="inp" type="text" th:field="*{name}" placeholder="John Doe" id="fname"/>
      <div class="err-msg" id="fnameErr">Name is required.</div>

      <label class="lbl">Email</label>
      <input class="inp" type="email" th:field="*{email}" placeholder="john@example.com" id="femail"/>
      <div class="err-msg" id="femailErr">Valid email is required.</div>

      <label class="lbl">Phone</label>
      <input class="inp" type="text" th:field="*{phone}" placeholder="0771234567" id="fphone"/>
      <div class="err-msg" id="fphoneErr">Phone must be 10 digits.</div>

      <label class="lbl">Role</label>
      <select class="inp" th:field="*{role}">
        <option value="">-- Select role --</option>
        <option value="CUSTOMER">Customer</option>
        <option value="ADMIN">Admin</option>
      </select>

      <button type="submit" class="btn-gold" onclick="return validate()"
              th:text="${isEdit} ? 'Update user' : 'Create user'">Create user</button>
    </form>
  </div>
</div>

<script>
function validate(){
  let ok=true;
  const show=(id,vis)=>{document.getElementById(id).style.display=vis?'block':'none'};
  const name=document.getElementById('fname').value.trim();
  show('fnameErr',!name); if(!name)ok=false;
  const email=document.getElementById('femail').value.trim();
  const eok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  show('femailErr',!eok); if(!eok)ok=false;
  const phone=document.getElementById('fphone').value.trim();
  const pok=/^\d{10}$/.test(phone);
  show('fphoneErr',!pok); if(!pok)ok=false;
  return ok;
}
</script>
</body>
</html>
