<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - CinemaBook</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            red: '#e8192c',
                            darkred: '#b01020',
                            black: '#0a0a0a',
                            card: '#111111',
                            border: '#2a2a2a',
                            muted: '#555555',
                            light: '#c8c8c8',
                        }
                    },
                    fontFamily: {
                        display: ['Bebas Neue', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: #c8c8c8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* Radial glow behind the card */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(232,25,44,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card-cinema {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Red top accent bar */
        .card-cinema::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e8192c, #b01020);
        }

        /* Decorative reel */
        .reel-decoration {
            position: absolute;
            right: -30px;
            bottom: -30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #1e1e1e;
            opacity: 0.35;
            pointer-events: none;
        }
        .reel-decoration::after {
            content: '';
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            border: 2px solid #1e1e1e;
        }

        .logo-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 4px;
            color: white;
            text-align: center;
        }

        .logo-accent { color: #e8192c; }

        .logo-sub {
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
            margin-top: 4px;
        }

        .field-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
            display: block;
            margin-bottom: 8px;
        }

        .field-input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .field-input:focus {
            outline: none;
            border-color: #e8192c;
            box-shadow: 0 0 0 3px rgba(232, 25, 44, 0.1);
        }

        .field-input::placeholder { color: #3a3a3a; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(232, 25, 44, 0.25);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #ff2d42, #e8192c);
            box-shadow: 0 4px 22px rgba(232, 25, 44, 0.45);
            transform: translateY(-1px);
        }

        .alert-error {
            background: rgba(232, 25, 44, 0.08);
            border: 1px solid rgba(232, 25, 44, 0.25);
            color: #e8192c;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: rgba(30, 200, 100, 0.07);
            border: 1px solid rgba(30, 200, 100, 0.2);
            color: #2ecc71;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #555555;
        }

        .footer-link {
            color: #e8192c;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover { color: #ff2d42; }
    </style>
</head>
<body>

<div class="card-cinema">
    <div class="reel-decoration"></div>

    <!-- Logo -->
    <div class="mb-8">
        <div class="logo-title">Cinema<span class="logo-accent">Book</span></div>
        <div class="logo-sub">Sign in to your account</div>
    </div>

    <!-- Alerts -->
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <div th:if="${param.registered}" class="alert-success">Account created! Please log in.</div>

    <!-- Form -->
    <form method="post" action="/login">
        <label class="field-label">Email</label>
        <input type="email" name="email" placeholder="you@example.com" required class="field-input"/>

        <label class="field-label">Password</label>
        <input type="password" name="password" placeholder="••••••••" required class="field-input"/>

        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <!-- Footer -->
    <div class="footer-text">
        No account? <a href="/register" class="footer-link">Create one</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
