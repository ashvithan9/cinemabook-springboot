<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--bg:#080808;--card:#111;--border:#1e1e1e;--muted:#555}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex}
.split{display:flex;width:100%;min-height:100vh}
.left{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.poster-mosaic{position:absolute;inset:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3px}
.mosaic-cell{position:relative;overflow:hidden;background:#0d0d0d}
.mosaic-cell img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.55) saturate(.8);transition:transform .4s}
.mosaic-cell:hover img{transform:scale(1.04);filter:brightness(.7) saturate(1)}
.mosaic-fallback{width:100%;height:100%;background:linear-gradient(160deg,#1a1200,#0d0900);display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.4}
.left-overlay{position:absolute;inset:0;background:linear-gradient(to top,#080808f0 0%,#08080877 40%,transparent 70%),linear-gradient(to right,#08080855 0%,transparent 55%);pointer-events:none}
.left-content{position:relative;z-index:2;padding:44px 48px}
.left-accent{width:40px;height:3px;background:var(--gold);border-radius:2px;margin-bottom:16px}
.left-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,5vw,72px);letter-spacing:.03em;line-height:.9;margin-bottom:14px}
.left-title span{color:var(--gold)}
.left-sub{font-size:13px;color:#888;letter-spacing:.06em}
.right{width:400px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 44px;background:#09090a;border-left:1px solid var(--border)}
.form-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.15em;margin-bottom:36px;display:flex;align-items:center;gap:8px}
.form-logo-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:.1em}
.form-title{font-size:22px;font-weight:500;margin-bottom:6px}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.lbl{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:18px}
.lbl:first-of-type{margin-top:0}
.inp{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:12px 14px;font-size:14px;color:#e0e0e0;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C1a}
.inp::placeholder{color:#333}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;padding:13px;border-radius:7px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:24px;letter-spacing:.02em;transition:background .2s}
.btn-gold:hover{background:#d4b560}
.alert-err{background:#1a0a0a;border:1px solid #e84a4a44;color:#e84a4a;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:18px}
.alert-ok{background:#0a1a0a;border:1px solid #4ade8044;color:#4ade80;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:18px}
.foot{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.foot a{color:var(--gold);text-decoration:none;font-weight:500}
.foot a:hover{color:#d4b560}
@media(max-width:700px){.left{display:none}.right{width:100%;padding:40px 24px}}
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="poster-mosaic" th:if="${not #lists.isEmpty(featuredMovies)}">
      <div class="mosaic-cell" th:each="m,i : ${featuredMovies}" th:if="${i.index < 6}">
        <img th:if="${not #strings.isEmpty(m.imageUrl)}"
             th:src="${m.imageUrl}" th:alt="${m.title}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="mosaic-fallback" th:style="${not #strings.isEmpty(m.imageUrl)} ? 'display:none' : ''">🎬</div>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(featuredMovies)}" style="position:absolute;inset:0;background:linear-gradient(160deg,#1a1000,#0d0800)"></div>
    <div class="left-overlay"></div>
    <div class="left-content">
      <div class="left-accent"></div>
      <div class="left-title">Your<br>cinema,<br><span>your</span><br>seat.</div>
      <div class="left-sub">Book tickets in seconds.</div>
    </div>
  </div>
  <div class="right">
    <div class="form-logo"><span class="form-logo-badge">CINEMA</span>BOOK</div>
    <div class="form-title">Sign in</div>
    <div class="form-sub">Welcome back — enter your details below.</div>
    <div th:if="${error}" class="alert-err" th:text="${error}"></div>
    <div th:if="${param.registered}" class="alert-ok">Account created! Please sign in.</div>
    <form method="post" action="/login" style="width:100%">
      <label class="lbl">Email</label>
      <input class="inp" type="email" name="email" placeholder="you@example.com" required/>
      <label class="lbl" style="margin-top:16px">Password</label>
      <input class="inp" type="password" name="password" placeholder="••••••••" required/>
      <button type="submit" class="btn-gold">Sign in</button>
    </form>
    <div class="foot" style="margin-top:20px">No account? <a href="/register">Create one</a></div>
  </div>
</div>
</body>
</html>
