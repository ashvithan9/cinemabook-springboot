<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users - CinemaBook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
        header { background: #1a1a2e; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: #e0b400; text-decoration: none; font-weight: bold; }
        .container { max-width: 1000px; margin: 32px auto; padding: 0 16px; }
        h1 { margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-edit { background: #e0b400; color: #1a1a2e; }
        .btn-danger { background: #c0392b; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; }
        td { padding: 12px 16px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .actions { display: flex; gap: 8px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input[type="text"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; width: 260px; }
    </style>
</head>
<body>
<header>
    <span>🎬 CinemaBook</span>
    <div style="display:flex; gap:16px; align-items:center;">
        <a href="/" style="color:#e0b400; text-decoration:none;">← Home</a>
        <a href="/logout" style="color:#aaa; text-decoration:none; font-size:13px;">Logout</a>
    </div>
</header>
<div class="container">
    <div class="top-bar">
        <h1>User Management</h1>
        <a href="/users/new" class="btn btn-primary">+ New User</a>
    </div>
    <input type="text" id="searchInput" placeholder="Search users..." onkeyup="filterTable()" style="margin-bottom:16px">
    <table id="userTable">
        <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.userId}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.phone}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <div class="actions">
                    <a th:href="@{/users/{id}(id=${user.userId})}" class="btn btn-primary">View</a>
                    <a th:href="@{/users/{id}/edit(id=${user.userId})}" class="btn btn-edit">Edit</a>
                    <form th:action="@{/users/{id}/delete(id=${user.userId})}" method="post"
                          onsubmit="return confirm('Delete this user?')">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script>
    function filterTable() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#userTable tbody tr");
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
