<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Users — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-dim:#C9A84C33;--bg:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--light:#aaa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
nav{display:flex;align-items:center;padding:0 48px;height:64px;background:#080808ee;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:auto}
.logo-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:.1em}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.15em;color:#fff}
.nav-link{font-size:13px;color:var(--light);padding:8px 14px;border-radius:6px;text-decoration:none;transition:color .2s,background .2s}
.nav-link:hover{color:#fff;background:#ffffff08}
.nav-link.active{color:#fff}
.nav-link.admin{color:var(--muted);font-size:12px}
.nav-divider{width:1px;height:16px;background:var(--border);margin:0 6px}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:24px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:#1e1a0a;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold);text-decoration:none}
.nav-logout{font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:border-color .2s,color .2s}
.nav-logout:hover{border-color:#444;color:var(--light)}
.wrap{max-width:1100px;margin:0 auto;padding:40px 48px 80px}
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.05em;margin-right:auto}
.search-inp{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:9px 14px;font-size:13px;color:#e0e0e0;font-family:'DM Sans',sans-serif;width:240px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--gold)}
.search-inp::placeholder{color:#333}
.btn-gold{background:var(--gold);color:#000;border:none;padding:9px 20px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .2s}
.btn-gold:hover{background:#d4b560}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative}
.table-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
table{width:100%;border-collapse:collapse}
thead th{background:#0d0d0d;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:14px 18px;text-align:left;border-bottom:1px solid var(--border)}
tbody td{padding:13px 18px;font-size:13px;color:var(--light);border-bottom:1px solid #141414}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#141414}
.role-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500}
.role-admin{background:#1e1a0a;color:var(--gold);border:1px solid var(--gold-dim)}
.role-customer{background:#1a1a1a;color:var(--muted);border:1px solid #2a2a2a}
.actions{display:flex;gap:6px;align-items:center}
.btn-sm{background:transparent;border:1px solid #2a2a2a;color:var(--light);border-radius:6px;padding:5px 11px;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-del{background:transparent;border:1px solid #2a2a2a;color:var(--muted);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-del:hover{border-color:#e84a4a;color:#e84a4a;background:#1a0a0a}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:.05em}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;margin-top:40px}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.15em;color:var(--muted)}
.footer-logo span{color:var(--gold)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="logo-badge">CINEMA</span><span class="logo-text">BOOK</span></a>
  <div style="display:flex;align-items:center;gap:2px">
    <a href="/movies" class="nav-link">Movies</a>
    <a href="/bookings/my" class="nav-link">My Bookings</a>
    <a href="/payments/my" class="nav-link">My Payments</a>
    <a href="/feedback" class="nav-link">Feedback</a>
    <div class="nav-divider"></div>
    <a href="/users" class="nav-link admin active">Users</a>
    <a href="/payments" class="nav-link admin">All Payments</a>
  </div>
  <div class="nav-right">
    <a href="/profile" class="nav-avatar">AD</a>
    <a href="/logout" class="nav-logout">Logout</a>
  </div>
</nav>

<div class="wrap">
  <div class="top-bar">
    <div class="page-title">User Management</div>
    <input class="search-inp" type="text" id="search" placeholder="Search users..." onkeyup="filterTable()"/>
    <a href="/users/new" class="btn-gold">+ New user</a>
  </div>

  <div class="table-card">
    <table id="userTable">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="user : ${users}">
          <td style="font-family:monospace;font-size:11px;color:var(--muted)" th:text="${user.userId}"></td>
          <td style="color:#fff;font-weight:500" th:text="${user.name}"></td>
          <td th:text="${user.email}"></td>
          <td th:text="${user.phone}"></td>
          <td>
            <span th:class="${user.role == 'ADMIN'} ? 'role-badge role-admin' : 'role-badge role-customer'"
                  th:text="${user.role}"></span>
          </td>
          <td>
            <div class="actions">
              <a th:href="@{/users/{id}/edit(id=${user.userId})}" class="btn-sm">Edit</a>
              <form th:action="@{/users/{id}/delete(id=${user.userId})}" method="post"
                    onsubmit="return confirm('Delete this user?')">
                <button type="submit" class="btn-del">Delete</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
          <td colspan="6" class="empty">No users found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-logo"><span>CINEMA</span>BOOK</div>
  
</footer>

<script>
function filterTable(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#userTable tbody tr').forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';
  });
}
</script>
</body>
</html>
