<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users - CinemaBook</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            red: '#e8192c',
                            darkred: '#b01020',
                            black: '#0a0a0a',
                            card: '#111111',
                            border: '#2a2a2a',
                            muted: '#555555',
                            light: '#c8c8c8',
                        }
                    },
                    fontFamily: {
                        display: ['Bebas Neue', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: #c8c8c8;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        header {
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #e8192c, transparent);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: white;
        }

        .logo-accent { color: #e8192c; }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: white;
        }

        .nav-link-home {
            color: #c8c8c8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .nav-link-home:hover { color: #e8192c; }

        .nav-link-cinema {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link-cinema:hover { color: #e8192c; }

        /* Search input */
        .search-input {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            width: 280px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #e8192c;
            box-shadow: 0 0 0 3px rgba(232, 25, 44, 0.1);
        }
        .search-input::placeholder { color: #3a3a3a; }

        /* Table */
        .table-wrap {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .table-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e8192c, #b01020);
        }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            background: #0d0d0d;
            color: #555555;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }

        tbody td {
            padding: 14px 20px;
            font-size: 14px;
            color: #c8c8c8;
            border-bottom: 1px solid #1a1a1a;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr {
            transition: background 0.15s;
        }
        tbody tr:hover td {
            background: #161616;
        }

        /* Buttons */
        .btn-view {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #888;
            border-radius: 5px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-view:hover {
            border-color: #e8192c;
            color: #e8192c;
        }

        .btn-edit {
            background: transparent;
            border: 1px solid #e8192c;
            color: #e8192c;
            border-radius: 5px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-edit:hover {
            background: #e8192c;
            color: white;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #555;
            border-radius: 5px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-danger:hover {
            border-color: #e8192c;
            color: #e8192c;
            background: #1a0a0a;
        }

        .btn-new {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(232, 25, 44, 0.25);
            white-space: nowrap;
        }
        .btn-new:hover {
            background: linear-gradient(135deg, #ff2d42, #e8192c);
            color: white;
            box-shadow: 0 4px 20px rgba(232, 25, 44, 0.45);
            transform: translateY(-1px);
        }
    </style>
</head>
<body style="position: relative; z-index: 1;">

<!-- Header -->
<header class="px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span class="logo-text">🎬 Cinema<span class="logo-accent">Book</span></span>
        <div class="flex gap-6 items-center">
            <a href="/" class="nav-link-home">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Home
            </a>
            <a href="/logout" class="nav-link-cinema">Logout</a>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="max-w-6xl mx-auto px-4 py-10" style="position: relative; z-index: 1;">

    <!-- Top bar -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="page-title">User Management</h1>
        <a href="/users/new" class="btn-new">+ New User</a>
    </div>

    <!-- Search -->
    <input type="text" id="searchInput" class="search-input mb-5"
           placeholder="Search users..." onkeyup="filterTable()">

    <!-- Table -->
    <div class="table-wrap">
        <table id="userTable">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.userId}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.phone}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <div class="flex gap-2">
                        <a th:href="@{/users/{id}(id=${user.userId})}" class="btn-view">View</a>
                        <a th:href="@{/users/{id}/edit(id=${user.userId})}" class="btn-edit">Edit</a>
                        <form th:action="@{/users/{id}/delete(id=${user.userId})}" method="post"
                              onsubmit="return confirm('Delete this user?')">
                            <button type="submit" class="btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filterTable() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#userTable tbody tr");
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
