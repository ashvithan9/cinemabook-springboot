<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Profile — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-dim:#C9A84C33;--bg:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--light:#aaa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
nav{display:flex;align-items:center;padding:0 48px;height:64px;background:#080808ee;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:auto}
.logo-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:.1em}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.15em;color:#fff}
.nav-link{font-size:13px;color:var(--light);padding:8px 14px;border-radius:6px;text-decoration:none;transition:color .2s,background .2s;white-space:nowrap}
.nav-link:hover{color:#fff;background:#ffffff08}
.nav-link.admin{color:var(--muted);font-size:12px}
.nav-divider{width:1px;height:16px;background:var(--border);margin:0 6px}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:24px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:#1e1a0a;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold);text-decoration:none}
.nav-logout{font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:border-color .2s,color .2s}
.nav-logout:hover{border-color:#444;color:var(--light)}
.wrap{max-width:960px;margin:0 auto;padding:48px}
.top-row{display:flex;align-items:flex-start;gap:40px;margin-bottom:40px}
.avatar-big{width:80px;height:80px;border-radius:50%;background:#1e1a0a;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);flex-shrink:0}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.05em;margin-bottom:6px}
.role-badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;letter-spacing:.05em}
.role-admin{background:#1e1a0a;color:var(--gold);border:1px solid var(--gold-dim)}
.role-customer{background:#1a1a1a;color:var(--muted);border:1px solid #2a2a2a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.card-title{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.lbl{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:18px}
.lbl:first-of-type{margin-top:0}
.inp{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:11px 14px;font-size:14px;color:#e0e0e0;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C1a}
.inp::placeholder{color:#333}
.inp[readonly]{background:#0d0d0d;color:#333;cursor:not-allowed;border-color:#1a1a1a}
.btn-gold{background:var(--gold);color:#000;border:none;padding:11px 26px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:20px;transition:background .2s}
.btn-gold:hover{background:#d4b560}
.alert-ok{background:#0a1a0a;border:1px solid #4ade8044;color:#4ade80;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--muted)}
.info-val{font-size:13px;color:var(--light)}
footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;margin-top:40px}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.15em;color:var(--muted)}
.footer-logo span{color:var(--gold)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="logo-badge">CINEMA</span><span class="logo-text">BOOK</span></a>
  <div style="display:flex;align-items:center;gap:2px">
    <a href="/movies" class="nav-link">Movies</a>
    <a href="/bookings/my" class="nav-link">My Bookings</a>
    <a href="/payments/my" class="nav-link">My Payments</a>
    <a href="/feedback" class="nav-link">Feedback</a>
  </div>
  <div class="nav-right">
    <a href="/profile" class="nav-avatar" th:text="${#strings.substring(user.name,0,2).toUpperCase()}">ME</a>
    <a href="/logout" class="nav-logout">Logout</a>
  </div>
</nav>

<div class="wrap">
  <div th:if="${param.updated}" class="alert-ok">Profile updated successfully.</div>

  <div class="top-row">
    <div class="avatar-big" th:text="${#strings.substring(user.name,0,2).toUpperCase()}">JD</div>
    <div>
      <div class="profile-name" th:text="${user.name}">John Doe</div>
      <span th:class="${user.role == 'ADMIN'} ? 'role-badge role-admin' : 'role-badge role-customer'"
            th:text="${user.role}">CUSTOMER</span>
      <div style="font-size:13px;color:var(--muted);margin-top:8px" th:text="${user.email}">john@example.com</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Edit profile</div>
      <form method="post" action="/profile/edit" th:object="${user}">
        <label class="lbl">Full name</label>
        <input class="inp" type="text" th:field="*{name}" required/>
        <label class="lbl">Email</label>
        <input class="inp" type="email" th:field="*{email}" required/>
        <label class="lbl">New password</label>
        <input class="inp" type="password" th:field="*{password}" placeholder="Leave blank to keep current"/>
        <label class="lbl">Phone</label>
        <input class="inp" type="text" th:field="*{phone}"/>
        <button type="submit" class="btn-gold">Save changes</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title">Account details</div>
      <div class="info-row">
        <span class="info-key">User ID</span>
        <span class="info-val" style="font-family:monospace;font-size:11px" th:text="${user.userId}">USR123</span>
      </div>
      <div class="info-row">
        <span class="info-key">Role</span>
        <span th:class="${user.role == 'ADMIN'} ? 'role-badge role-admin' : 'role-badge role-customer'"
              th:text="${user.role}">CUSTOMER</span>
      </div>
      <div class="info-row">
        <span class="info-key">Phone</span>
        <span class="info-val" th:text="${user.phone}">—</span>
      </div>
      <div style="margin-top:24px;display:flex;flex-direction:column;gap:8px">
        <a href="/bookings/my" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:7px;text-decoration:none;color:var(--light);font-size:13px;transition:border-color .2s">
          My bookings <span style="color:var(--gold)">→</span>
        </a>
        <a href="/payments/my" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:7px;text-decoration:none;color:var(--light);font-size:13px;transition:border-color .2s">
          My payments <span style="color:var(--gold)">→</span>
        </a>
        <a href="/feedback" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:7px;text-decoration:none;color:var(--light);font-size:13px">
          My reviews <span style="color:var(--gold)">→</span>
        </a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo"><span>CINEMA</span>BOOK</div>
  
</footer>
</body>
</html>
