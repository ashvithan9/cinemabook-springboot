<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Show Detail — CinemaBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--bg:#080808;--card:#111;--bd:#1e1e1e;--mu:#555;--li:#aaa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
nav{display:flex;align-items:center;padding:0 40px;height:62px;background:#080808f0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:7px;text-decoration:none;margin-right:auto}
.lb{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 6px;border-radius:3px}
.lt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em;color:#fff}
.nl{font-size:13px;color:var(--li);padding:7px 12px;border-radius:6px;text-decoration:none}
.nl:hover{color:#fff}
.nr{display:flex;align-items:center;gap:10px;margin-left:20px}
.lo{font-size:12px;color:var(--mu);padding:5px 10px;border:1px solid var(--bd);border-radius:6px;text-decoration:none}
.lo:hover{border-color:#444;color:var(--li)}
.wp{max-width:560px;margin:50px auto;padding:0 24px}
.bk{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--mu);text-decoration:none;margin-bottom:20px;transition:color .15s}
.bk:hover{color:var(--gold)}
.pt{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;margin-bottom:24px}
.cd{background:var(--card);border:1px solid var(--bd);border-radius:11px;overflow:hidden;position:relative}
.cd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.cdp{padding:24px}
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #111}
.row:last-child{border-bottom:none}
.rk{font-size:12px;color:var(--mu)}
.rv{font-size:14px;color:var(--li);font-weight:500}
.rv.gold{color:var(--gold)}
.seats-bar{background:#1a1a1a;border-radius:99px;height:5px;margin:14px 0 4px;overflow:hidden}
.seats-fill{background:var(--gold);height:100%;border-radius:99px}
.actions{display:flex;gap:8px;padding:16px 24px;background:#0a0a0a;border-top:1px solid var(--bd)}
.bg{background:var(--gold);color:#000;border:none;padding:10px 22px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.bg:hover{background:#d4b560}
.bo{background:transparent;color:var(--li);border:1px solid #2a2a2a;padding:10px 22px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.bo:hover{border-color:#444}
.bd{background:transparent;color:#e84a4a;border:1px solid #e84a4a44;padding:10px 18px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.bd:hover{background:#100808}
footer{border-top:1px solid var(--bd);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:60px}
.fl{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.12em;color:var(--mu)}
.fl span{color:var(--gold)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="lb">CINEMA</span><span class="lt">BOOK</span></a>
  <div style="display:flex;align-items:center;gap:2px">
    <a href="/movies" class="nl">Movies</a>
    <a href="/shows" class="nl">Shows</a>
  </div>
  <div class="nr"><a href="/logout" class="lo">Logout</a></div>
</nav>

<div class="wp">
  <a href="/movies" class="bk">← Movies</a>
  <div class="pt">Show Details</div>

  <div class="cd" th:if="${show!=null}">
    <div class="cdp">
      <div class="row">
        <span class="rk">Movie</span>
        <span class="rv" style="color:#fff" th:text="${show.movieTitle}">—</span>
      </div>
      <div class="row">
        <span class="rk">Date</span>
        <span class="rv" th:text="${show.date}">—</span>
      </div>
      <div class="row">
        <span class="rk">Time</span>
        <span class="rv" th:text="${show.time}">—</span>
      </div>
      <div class="row">
        <span class="rk">Hall</span>
        <span class="rv" th:text="${show.hall}">—</span>
      </div>
      <div class="row">
        <span class="rk">Price per seat</span>
        <span class="rv gold" th:text="'$'+${show.price}">—</span>
      </div>
      <div class="seats-bar">
        <div class="seats-fill" th:style="'width:'+${(show.availableSeats*100/show.totalSeats)}+'%'"></div>
      </div>
      <div class="row" style="margin-top:4px">
        <span class="rk">Available seats</span>
        <span class="rv" th:text="${show.availableSeats}+' / '+${show.totalSeats}">—</span>
      </div>
    </div>
    <div class="actions">
      <a th:if="${show.availableSeats>0}" th:href="@{/bookings/new(showId=${show.showId})}" class="bg">▶ Book seats</a>
      <a th:href="@{/shows(movieId=${show.movieId})}" class="bo">← All shows</a>
      <a th:if="${userRole=='ADMIN'}" th:href="@{/shows/{id}/edit(id=${show.showId})}" class="bo">Edit</a>
      <form th:if="${userRole=='ADMIN'}" th:action="@{/shows/{id}/delete(id=${show.showId})}" method="post"
            onsubmit="return confirm('Delete show?')">
        <button type="submit" class="bd">Delete</button>
      </form>
    </div>
  </div>
</div>

<footer><div class="fl"><span>CINEMA</span>BOOK</div></footer>
</body>
</html>
