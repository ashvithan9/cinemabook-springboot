<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback – CinemaBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                    colors: { cinema: { red:'#e8192c', darkred:'#b01020', black:'#0a0a0a',
                            card:'#111111', border:'#2a2a2a', muted:'#555555', light:'#c8c8c8' }},
                    fontFamily: { display:['Bebas Neue','sans-serif'], body:['DM Sans','sans-serif'] }
                }}
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family:'DM Sans',sans-serif; background:#0a0a0a; color:#c8c8c8; margin:0; }

        /* grain overlay */
        body::before { content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events:none; z-index:0; opacity:0.5; }

        header { background:#0a0a0a; border-bottom:1px solid #2a2a2a; position:relative; z-index:10; }
        header::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:2px;
            background:linear-gradient(90deg,#e8192c,transparent); }

        .logo-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px; color:white; }
        .logo-accent { color:#e8192c; }
        .logo-sub    { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#555; margin-top:1px; }

        .nav-btn { background:transparent; border:1px solid #2a2a2a; color:#888; padding:6px 16px;
            border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; text-decoration:none;
            transition:all 0.2s; font-family:'DM Sans',sans-serif; display:inline-block; }
        .nav-btn:hover { border-color:#e8192c; color:#e8192c; }

        .section-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:3px;
            color:#555; margin-bottom:16px; margin-top:40px; display:block; }

        /* Stat boxes */
        .stat-box { background:#111; border:1px solid #2a2a2a; border-radius:10px; padding:18px 22px; }
        .stat-num  { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:white; line-height:1; }
        .stat-label{ font-size:10px; color:#555; text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }

        /* Card */
        .cinema-card { background:#111; border:1px solid #2a2a2a; border-radius:12px; padding:24px;
            position:relative; overflow:hidden; transition:all 0.2s; }
        .cinema-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg,#e8192c,transparent); opacity:0; transition:opacity 0.2s; }
        .cinema-card:hover { border-color:#3a3a3a; transform:translateY(-2px);
            box-shadow:0 8px 24px rgba(0,0,0,0.4); }
        .cinema-card:hover::before { opacity:1; }

        /* Form inputs */
        .form-input { background:#1a1a1a; border:1px solid #2a2a2a; color:#c8c8c8; border-radius:8px;
            padding:10px 14px; width:100%; font-size:14px; font-family:'DM Sans',sans-serif;
            outline:none; transition:border-color 0.2s; }
        .form-input:focus { border-color:#e8192c; }
        .form-input::placeholder { color:#444; }
        textarea.form-input { resize:vertical; min-height:80px; }

        /* Star rating (interactive) */
        .star-picker { display:flex; gap:4px; }
        .star-pick   { font-size:28px; color:#2a2a2a; cursor:pointer; transition:color 0.12s; line-height:1; }
        .star-pick.on { color:#e8192c; }

        /* Star display (read-only) */
        .star-show     { font-size:15px; color:#2a2a2a; }
        .star-show.on  { color:#e8192c; }

        /* Buttons */
        .submit-btn { background:linear-gradient(135deg,#e8192c,#b01020); color:white; border:none;
            padding:11px 32px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
            letter-spacing:0.5px; transition:opacity 0.2s; font-family:'DM Sans',sans-serif; }
        .submit-btn:hover { opacity:0.85; }

        .filter-btn { background:transparent; border:1px solid #2a2a2a; color:#666; padding:5px 16px;
            border-radius:20px; font-size:12px; cursor:pointer; text-decoration:none;
            transition:all 0.2s; display:inline-block; font-weight:500; }
        .filter-btn:hover, .filter-btn.active { border-color:#e8192c; color:#e8192c; }

        .like-btn { background:transparent; border:1px solid #2a2a2a; color:#555; padding:5px 14px;
            border-radius:20px; font-size:12px; cursor:pointer; transition:all 0.2s;
            font-family:'DM Sans',sans-serif; }
        .like-btn:hover { border-color:#e8192c; color:#e8192c; }

        .delete-btn { background:transparent; border:1px solid #2a2a2a; color:#555; padding:5px 14px;
            border-radius:8px; font-size:12px; cursor:pointer; transition:all 0.2s;
            font-family:'DM Sans',sans-serif; }
        .delete-btn:hover { border-color:#e8192c; color:#e8192c; background:rgba(232,25,44,0.05); }

        /* Sentiment badge */
        .badge-pos { font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 10px;
            border-radius:20px; text-transform:uppercase;
            background:rgba(74,222,128,0.08); color:#4ade80; border:1px solid rgba(74,222,128,0.2); }
        .badge-neg { font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 10px;
            border-radius:20px; text-transform:uppercase;
            background:rgba(232,25,44,0.08); color:#e8192c; border:1px solid rgba(232,25,44,0.2); }

        .empty-state { text-align:center; padding:64px 0; color:#444; font-size:15px; }
        .empty-state span { display:block; font-size:40px; margin-bottom:12px; }

        .divider { border:none; border-top:1px solid #1e1e1e; margin:0; }

        /* Page wrapper */
        .page { position:relative; z-index:1; }
    </style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════════ -->
<header class="px-6 py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div>
            <div class="logo-title">Cinema<span class="logo-accent">Book</span></div>
            <div class="logo-sub">Feedback &amp; Reviews</div>
        </div>
        <div class="flex items-center gap-3">
            <a href="/" class="nav-btn">← Home</a>
            <a href="/logout" class="nav-btn">Logout</a>
        </div>
    </div>
</header>

<div class="page max-w-5xl mx-auto px-4 pb-20">

    <!-- ═══ STATS ═══════════════════════════════════════════════════ -->
    <span class="section-label">Overview</span>
    <div class="grid grid-cols-4 gap-4">
        <div class="stat-box">
            <div class="stat-num" th:text="${totalCount}">0</div>
            <div class="stat-label">Total Reviews</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" th:text="${#numbers.formatDecimal(avgRating,1,1)}">0.0</div>
            <div class="stat-label">Avg Rating</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" style="color:#4ade80" th:text="${positiveCount}">0</div>
            <div class="stat-label">Positive</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" style="color:#e8192c" th:text="${negativeCount}">0</div>
            <div class="stat-label">Negative</div>
        </div>
    </div>

    <!-- ═══ SUBMIT FORM ══════════════════════════════════════════════ -->
    <span class="section-label">Write a Review</span>
    <div class="cinema-card mb-2">
        <form action="/feedback/add" method="post">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:6px;">Your Name</label>
                    <input class="form-input" type="text" name="username" placeholder="e.g. john_doe" required>
                </div>
                <div>
                    <label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:6px;">Movie Title</label>
                    <input class="form-input" type="text" name="movieTitle" placeholder="e.g. Avengers Endgame" required>
                </div>
            </div>

            <!-- Interactive star picker -->
            <div class="mb-4">
                <label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:8px;">Your Rating</label>
                <div class="star-picker" id="starPicker">
                    <span class="star-pick" data-v="1">★</span>
                    <span class="star-pick" data-v="2">★</span>
                    <span class="star-pick" data-v="3">★</span>
                    <span class="star-pick" data-v="4">★</span>
                    <span class="star-pick" data-v="5">★</span>
                </div>
                <input type="hidden" name="rating" id="ratingVal" value="0">
                <p id="ratingHint" style="font-size:11px;color:#555;margin-top:6px;">Click a star to rate</p>
            </div>

            <div class="mb-5">
                <label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:6px;">Your Review</label>
                <textarea class="form-input" name="comment" placeholder="Share your thoughts about this movie..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Review</button>
        </form>
    </div>

    <!-- ═══ FILTER + LIST ════════════════════════════════════════════ -->
    <div class="flex justify-between items-center" style="margin-top:40px;margin-bottom:16px;">
        <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:#555;">All Reviews</span>
        <div class="flex gap-2">
            <a th:href="@{/feedback}"                     class="filter-btn" th:classappend="${filter == null}          ? ' active' : ''">All</a>
            <a th:href="@{/feedback(filter='POSITIVE')}"  class="filter-btn" th:classappend="${filter == 'POSITIVE'}    ? ' active' : ''">⬆ Positive</a>
            <a th:href="@{/feedback(filter='NEGATIVE')}"  class="filter-btn" th:classappend="${filter == 'NEGATIVE'}    ? ' active' : ''">⬇ Negative</a>
        </div>
    </div>

    <!-- Feedback cards -->
    <div th:if="${!feedbacks.isEmpty()}" class="flex flex-col gap-3">
        <div class="cinema-card" th:each="f : ${feedbacks}">
            <div class="flex justify-between items-start gap-4">

                <!-- Left: info -->
                <div class="flex-1">
                    <!-- Username + badge -->
                    <div class="flex items-center gap-3 mb-1">
                        <span style="color:white;font-weight:600;font-size:14px;" th:text="${f.username}"></span>
                        <span th:if="${f.sentiment == 'POSITIVE'}" class="badge-pos">Positive</span>
                        <span th:if="${f.sentiment == 'NEGATIVE'}" class="badge-neg">Negative</span>
                    </div>

                    <!-- Movie + date -->
                    <div style="font-size:12px;color:#555;margin-bottom:8px;">
                        🎬 <span th:text="${f.movieTitle}"></span>
                        &nbsp;·&nbsp;
                        <span th:text="${f.date}"></span>
                    </div>

                    <!-- Star display -->
                    <div style="margin-bottom:10px;">
                        <th:block th:each="i : ${#numbers.sequence(1,5)}">
                            <span class="star-show" th:classappend="${i <= f.rating} ? ' on' : ''">★</span>
                        </th:block>
                        <span style="font-size:12px;color:#555;margin-left:6px;" th:text="${f.rating} + '/5'"></span>
                    </div>

                    <!-- Comment -->
                    <p style="font-size:14px;color:#c8c8c8;margin:0;line-height:1.6;" th:text="${f.comment}"></p>
                </div>

                <!-- Right: actions -->
                <div class="flex flex-col items-end gap-2" style="min-width:90px;">
                    <!-- Like -->
                    <form th:action="@{/feedback/like/{id}(id=${f.id})}" method="post">
                        <button type="submit" class="like-btn">
                            ♡ <span th:text="${f.likes}">0</span>
                        </button>
                    </form>
                    <!-- Delete -->
                    <form th:action="@{/feedback/delete/{id}(id=${f.id})}" method="post">
                        <button type="submit" class="delete-btn"
                                onclick="return confirm('Delete this review?')">
                            🗑 Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${feedbacks.isEmpty()}">
        <span>🎬</span>
        No reviews found. Be the first to leave one!
    </div>

</div><!-- /page -->

<!-- ═══ SCRIPTS ═══════════════════════════════════════════════════ -->
<script>
    // Interactive star picker
    const stars   = document.querySelectorAll('.star-pick');
    const input   = document.getElementById('ratingVal');
    const hint    = document.getElementById('ratingHint');
    const labels  = ['','Terrible','Poor','Average','Good','Excellent'];
    let selected  = 0;

    function paintStars(upTo) {
        stars.forEach(s => s.classList.toggle('on', +s.dataset.v <= upTo));
    }

    stars.forEach(s => {
        s.addEventListener('mouseenter', () => paintStars(+s.dataset.v));
        s.addEventListener('mouseleave', () => paintStars(selected));
        s.addEventListener('click', () => {
            selected     = +s.dataset.v;
            input.value  = selected;
            hint.textContent = labels[selected] + ' (' + selected + '/5)';
            paintStars(selected);
        });
    });d
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
