<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movies - CinemaBook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #f0f0f0; }

        header { background: #1a0000; border-bottom: 2px solid #cc0000; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header span { font-size: 20px; font-weight: bold; color: #cc0000; letter-spacing: 1px; }
        header div { display: flex; gap: 16px; align-items: center; }
        header a { color: #f0f0f0; text-decoration: none; font-size: 14px; }
        header a:hover { color: #cc0000; }

        .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .top-bar h1 { font-size: 26px; color: #cc0000; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-admin { background: #cc0000; color: white; }
        .btn-admin:hover { background: #aa0000; }

        input[type="text"] { background: #1a1a1a; border: 1px solid #333; color: #f0f0f0; padding: 10px 14px; border-radius: 6px; width: 280px; font-size: 14px; margin-bottom: 28px; }
        input[type="text"]::placeholder { color: #666; }
        input[type="text"]:focus { outline: none; border-color: #cc0000; }

        .section-title { font-size: 18px; font-weight: bold; color: #cc0000; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #2a0000; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 20px; background: #cc0000; border-radius: 2px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 48px; }

        .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #2a2a2a; transition: transform 0.2s, border-color 0.2s; }
        .movie-card:hover { transform: translateY(-4px); border-color: #cc0000; }

        .movie-poster { width: 100%; height: 200px; object-fit: cover; background: #111; display: flex; align-items: center; justify-content: center; color: #444; font-size: 40px; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; }

        .movie-info { padding: 14px; }
        .movie-title { font-size: 15px; font-weight: bold; color: #f0f0f0; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .badge-now { background: #cc0000; color: white; }
        .badge-soon { background: #333; color: #aaa; }

        .rating { color: #e0b400; font-size: 13px; margin-bottom: 10px; }

        .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-view { background: #cc0000; color: white; padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; }
        .btn-view:hover { background: #aa0000; }
        .btn-edit { background: #333; color: #f0f0f0; padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; }
        .btn-edit:hover { background: #444; }
        .btn-delete { background: transparent; border: 1px solid #cc0000; color: #cc0000; padding: 5px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn-delete:hover { background: #cc0000; color: white; }

        .empty { text-align: center; color: #555; padding: 40px; font-size: 15px; }
    </style>
</head>
<body>
<header>
    <span>🎬 CinemaBook</span>
    <div>
        <a href="/">← Home</a>
        <a href="/logout">Logout</a>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <h1>Movies</h1>
        <a th:if="${userRole == 'ADMIN'}" href="/movies/new" class="btn btn-admin">+ Add Movie</a>
    </div>

    <input type="text" id="searchInput" placeholder="Search movies..." onkeyup="filterMovies()"/>

    <!-- Now Showing -->
    <div class="section-title">Now Showing</div>
    <div class="grid" id="nowShowingGrid">
        <div th:each="movie : ${nowShowing}" class="movie-card" th:attr="data-title=${movie.title},data-genre=${movie.genre}">
            <div class="movie-poster">
                <img th:if="${movie.imageUrl != null and !movie.imageUrl.isEmpty()}"
                     th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
                <div style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:40px;">🎬</div>
            </div>
            <div class="movie-info">
                <div class="badge badge-now">Now Showing</div>
                <div class="movie-title" th:text="${movie.title}"></div>
                <div class="movie-meta" th:text="${movie.genre} + ' · ' + ${movie.duration} + ' min'"></div>
                <div class="rating" th:text="'★ ' + ${movie.rating} + '/10'"></div>
                <div class="card-actions">
                    <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn-view">View</a>
                    <a th:if="${userRole == 'ADMIN'}" th:href="@{/movies/{id}/edit(id=${movie.movieId})}" class="btn-edit">Edit</a>
                    <form th:if="${userRole == 'ADMIN'}" th:action="@{/movies/{id}/delete(id=${movie.movieId})}" method="post"
                          onsubmit="return confirm('Delete this movie?')">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(nowShowing)}" class="empty">No movies currently showing.</div>
    </div>

    <!-- Coming Soon -->
    <div class="section-title">Coming Soon</div>
    <div class="grid" id="comingSoonGrid">
        <div th:each="movie : ${comingSoon}" class="movie-card" th:attr="data-title=${movie.title},data-genre=${movie.genre}">
            <div class="movie-poster">
                <img th:if="${movie.imageUrl != null and !movie.imageUrl.isEmpty()}"
                     th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
                <div style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:40px;">🎬</div>
            </div>
            <div class="movie-info">
                <div class="badge badge-soon">Coming Soon</div>
                <div class="movie-title" th:text="${movie.title}"></div>
                <div class="movie-meta" th:text="${movie.genre} + ' · ' + ${movie.duration} + ' min'"></div>
                <div class="rating" th:text="'★ ' + ${movie.rating} + '/10'"></div>
                <div class="card-actions">
                    <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn-view">View</a>
                    <a th:if="${userRole == 'ADMIN'}" th:href="@{/movies/{id}/edit(id=${movie.movieId})}" class="btn-edit">Edit</a>
                    <form th:if="${userRole == 'ADMIN'}" th:action="@{/movies/{id}/delete(id=${movie.movieId})}" method="post"
                          onsubmit="return confirm('Delete this movie?')">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(comingSoon)}" class="empty">No upcoming movies.</div>
    </div>
</div>

<script>
    function filterMovies() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".movie-card").forEach(card => {
            const title = card.getAttribute("data-title").toLowerCase();
            const genre = card.getAttribute("data-genre").toLowerCase();
            card.style.display = (title.includes(input) || genre.includes(input)) ? "" : "none";
        });
    }
</script>
</body>
</html>
