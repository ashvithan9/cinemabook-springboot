<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movies - CinemaBook</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            red: '#e8192c',
                            darkred: '#b01020',
                            black: '#0a0a0a',
                            card: '#111111',
                            border: '#2a2a2a',
                            muted: '#555555',
                            light: '#c8c8c8',
                        }
                    },
                    fontFamily: {
                        display: ['Bebas Neue', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: #c8c8c8;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        header {
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #e8192c, transparent);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: white;
        }

        .logo-accent { color: #e8192c; }

        .nav-link {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #e8192c; }

        .nav-link-home {
            color: #c8c8c8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .nav-link-home:hover { color: #e8192c; }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: white;
        }

        /* Search */
        .search-input {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            width: 280px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #e8192c;
            box-shadow: 0 0 0 3px rgba(232, 25, 44, 0.1);
        }
        .search-input::placeholder { color: #3a3a3a; }

        /* Section title */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: white;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #e8192c, #b01020);
            border-radius: 2px;
        }

        /* Movie card */
        .movie-card {
            background: #111111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .movie-card:hover {
            transform: translateY(-4px);
            border-color: #e8192c;
            box-shadow: 0 8px 24px rgba(232, 25, 44, 0.1);
        }

        .movie-poster {
            width: 100%;
            height: 200px;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }
        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-info { padding: 14px; }

        .movie-title-text {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 11px;
            color: #555555;
            margin-bottom: 6px;
        }

        .badge-now {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .badge-soon {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #555555;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .rating-text {
            color: #e8b400;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* Card buttons */
        .btn-view {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            padding: 5px 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-view:hover {
            background: linear-gradient(135deg, #ff2d42, #e8192c);
            color: white;
        }

        .btn-edit {
            background: transparent;
            border: 1px solid #e8192c;
            color: #e8192c;
            padding: 5px 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-edit:hover {
            background: #e8192c;
            color: white;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #555;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-delete:hover {
            border-color: #e8192c;
            color: #e8192c;
            background: #1a0a0a;
        }

        .btn-add {
            background: linear-gradient(135deg, #e8192c, #b01020);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(232, 25, 44, 0.25);
            white-space: nowrap;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #ff2d42, #e8192c);
            color: white;
            box-shadow: 0 4px 20px rgba(232, 25, 44, 0.45);
            transform: translateY(-1px);
        }

        .empty {
            text-align: center;
            color: #333;
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body style="position: relative; z-index: 1;">

<!-- Header -->
<header class="px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span class="logo-text">🎬 Cinema<span class="logo-accent">Book</span></span>
        <div class="flex gap-6 items-center">
            <a href="/" class="nav-link-home">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Home
            </a>
            <a href="/logout" class="nav-link">Logout</a>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="max-w-6xl mx-auto px-4 py-10" style="position: relative; z-index: 1;">

    <!-- Top bar -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="page-title">Movies</h1>
        <a th:if="${userRole == 'ADMIN'}" href="/movies/new" class="btn-add">+ Add Movie</a>
    </div>

    <!-- Search -->
    <input type="text" id="searchInput" class="search-input mb-8"
           placeholder="Search movies..." onkeyup="filterMovies()"/>

    <!-- Now Showing -->
    <div class="section-title mb-4">Now Showing</div>
    <div class="grid mb-12" id="nowShowingGrid"
         style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">

        <div th:each="movie : ${nowShowing}" class="movie-card"
             th:attr="data-title=${movie.title},data-genre=${movie.genre}">
            <div class="movie-poster">
                <img th:if="${movie.imageUrl != null and !movie.imageUrl.isEmpty()}"
                     th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
                <div style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:40px;">🎬</div>
            </div>
            <div class="movie-info">
                <div class="badge-now">Now Showing</div>
                <div class="movie-title-text" th:text="${movie.title}"></div>
                <div class="movie-meta" th:text="${movie.genre} + ' · ' + ${movie.duration} + ' min'"></div>
                <div class="rating-text" th:text="'★ ' + ${movie.rating} + '/10'"></div>
                <div class="flex gap-2 flex-wrap">
                    <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn-view">View</a>
                    <a th:if="${userRole == 'ADMIN'}" th:href="@{/movies/{id}/edit(id=${movie.movieId})}" class="btn-edit">Edit</a>
                    <form th:if="${userRole == 'ADMIN'}" th:action="@{/movies/{id}/delete(id=${movie.movieId})}" method="post"
                          onsubmit="return confirm('Delete this movie?')">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(nowShowing)}" class="empty">No movies currently showing.</div>
    </div>

    <!-- Coming Soon -->
    <div class="section-title mb-4">Coming Soon</div>
    <div class="grid mb-12" id="comingSoonGrid"
         style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">

        <div th:each="movie : ${comingSoon}" class="movie-card"
             th:attr="data-title=${movie.title},data-genre=${movie.genre}">
            <div class="movie-poster">
                <img th:if="${movie.imageUrl != null and !movie.imageUrl.isEmpty()}"
                     th:src="${movie.imageUrl}" th:alt="${movie.title}"
                     onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
                <div style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:40px;">🎬</div>
            </div>
            <div class="movie-info">
                <div class="badge-soon">Coming Soon</div>
                <div class="movie-title-text" th:text="${movie.title}"></div>
                <div class="movie-meta" th:text="${movie.genre} + ' · ' + ${movie.duration} + ' min'"></div>
                <div class="rating-text" th:text="'★ ' + ${movie.rating} + '/10'"></div>
                <div class="flex gap-2 flex-wrap">
                    <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn-view">View</a>
                    <a th:if="${userRole == 'ADMIN'}" th:href="@{/movies/{id}/edit(id=${movie.movieId})}" class="btn-edit">Edit</a>
                    <form th:if="${userRole == 'ADMIN'}" th:action="@{/movies/{id}/delete(id=${movie.movieId})}" method="post"
                          onsubmit="return confirm('Delete this movie?')">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(comingSoon)}" class="empty">No upcoming movies.</div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filterMovies() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".movie-card").forEach(card => {
            const title = card.getAttribute("data-title").toLowerCase();
            const genre = card.getAttribute("data-genre").toLowerCase();
            card.style.display = (title.includes(input) || genre.includes(input)) ? "" : "none";
        });
    }
</script>
</body>
</html>
