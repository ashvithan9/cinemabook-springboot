<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Form - CinemaBook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #f0f0f0; }
        header { background: #1a0000; border-bottom: 2px solid #cc0000; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header span { font-size: 20px; font-weight: bold; color: #cc0000; }
        header a { color: #f0f0f0; text-decoration: none; font-size: 14px; }
        header a:hover { color: #cc0000; }
        .container { max-width: 560px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1a1a1a; border-radius: 10px; padding: 36px; border: 1px solid #2a2a2a; }
        h1 { font-size: 22px; color: #cc0000; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; color: #f0f0f0; border-radius: 6px; font-size: 14px; margin-bottom: 18px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #cc0000; }
        textarea { resize: vertical; min-height: 90px; }
        select option { background: #111; }
        .btn { width: 100%; padding: 12px; background: #cc0000; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #aa0000; }
        .preview { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 18px; display: none; background: #111; border: 1px solid #333; }
    </style>
</head>
<body>
<header>
    <span>🎬 CinemaBook</span>
    <a href="/movies">← Back to Movies</a>
</header>
<div class="container">
    <div class="card">
        <h1 th:text="${isEdit} ? 'Edit Movie' : 'Add New Movie'"></h1>
        <form th:action="${isEdit} ? @{/movies/{id}/edit(id=${movie.movieId})} : @{/movies}"
              th:object="${movie}" method="post">

            <label>Title</label>
            <input type="text" th:field="*{title}" placeholder="Movie title" required/>

            <label>Genre</label>
            <input type="text" th:field="*{genre}" placeholder="Action, Drama, Comedy..."/>

            <label>Duration (minutes)</label>
            <input type="text" th:field="*{duration}" placeholder="120"/>

            <label>Rating (out of 10)</label>
            <input type="text" th:field="*{rating}" placeholder="8.5"/>

            <label>Description</label>
            <textarea th:field="*{description}" placeholder="Brief description of the movie..."></textarea>

            <label>Poster Image URL</label>
            <input type="text" th:field="*{imageUrl}" placeholder="https://..." id="imageUrlInput" oninput="previewImage()"/>
            <img id="imagePreview" class="preview" alt="Poster preview"/>

            <label>Status</label>
            <select th:field="*{status}">
                <option value="">-- Select Status --</option>
                <option value="NOW_SHOWING">Now Showing</option>
                <option value="COMING_SOON">Coming Soon</option>
            </select>

            <button type="submit" class="btn" th:text="${isEdit} ? 'Update Movie' : 'Add Movie'"></button>
        </form>
    </div>
</div>
<script>
    function previewImage() {
        const url = document.getElementById("imageUrlInput").value;
        const preview = document.getElementById("imagePreview");
        if (url) {
            preview.src = url;
            preview.style.display = "block";
            preview.onerror = () => preview.style.display = "none";
        } else {
            preview.style.display = "none";
        }
    }
    // Show preview on load if editing
    window.onload = () => {
        const url = document.getElementById("imageUrlInput").value;
        if (url) previewImage();
    };
</script>
</body>
</html>
