<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments - CinemaBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: { red: '#e8192c', darkred: '#b01020', black: '#0a0a0a', card: '#111111', border: '#2a2a2a', muted: '#555555', light: '#c8c8c8' }
                    },
                    fontFamily: { display: ['Bebas Neue', 'sans-serif'], body: ['DM Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0a0a; color: #c8c8c8; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
        header { background: #0a0a0a; border-bottom: 1px solid #2a2a2a; position: relative; }
        header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, #e8192c, transparent); }
        .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: white; }
        .logo-accent { color: #e8192c; }
        .logo-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-top: 1px; }
        .nav-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .nav-btn:hover { border-color: #e8192c; color: #e8192c; }
        .admin-badge { background: linear-gradient(135deg, #e8192c, #b01020); color: white; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: #555; margin-bottom: 16px; margin-top: 40px; }
        .stat-card { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; }
        .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: white; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-top: 4px; }
        .table-card { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0a0a0a; color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; padding: 14px 16px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        td { padding: 14px 16px; border-bottom: 1px solid #1a1a1a; font-size: 13px; color: #c8c8c8; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #161616; }
        .badge-completed { background: rgba(34,197,94,0.1); color: #22c55e; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: rgba(234,179,8,0.1); color: #eab308; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-failed { background: rgba(232,25,44,0.1); color: #e8192c; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .action-btn { padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; }
        .btn-view { background: #1a1a1a; color: #c8c8c8; border: 1px solid #2a2a2a; }
        .btn-view:hover { border-color: #e8192c; color: #e8192c; }
        .btn-edit { background: rgba(232,25,44,0.1); color: #e8192c; border: 1px solid rgba(232,25,44,0.2); }
        .btn-delete { background: transparent; color: #e8192c; border: 1px solid #e8192c; }
        .btn-delete:hover { background: #e8192c; color: white; }
        .search-input { background: #111; border: 1px solid #2a2a2a; color: #c8c8c8; padding: 10px 14px; border-radius: 8px; font-size: 13px; width: 280px; font-family: 'DM Sans', sans-serif; }
        .search-input:focus { outline: none; border-color: #e8192c; }
        .card-chip { display: inline-flex; align-items: center; gap: 6px; background: #1a1a1a; border: 1px solid #2a2a2a; padding: 3px 10px; border-radius: 6px; font-size: 11px; }
        .success-banner { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; }
    </style>
</head>
<body style="position:relative; z-index:1;">

<header class="px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div>
            <div class="logo-title">Cinema<span class="logo-accent">Book</span></div>
            <div class="logo-sub">Cinema Booking System</div>
        </div>
        <div class="flex items-center gap-4">
            <div th:if="${userRole == 'ADMIN'}" class="admin-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L3 7l9 5 9-5-9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/>
                </svg>
                Admin
            </div>
            <span style="font-size:13px; color:#888;" th:text="${userName}"></span>
            <a href="/" class="nav-btn">← Home</a>
            <a href="/logout" class="nav-btn">Logout</a>
        </div>
    </div>
</header>

<div class="max-w-6xl mx-auto px-4 pb-16" style="position:relative; z-index:1;">

    <!-- Success banner -->
    <div th:if="${param.success}" class="success-banner" style="margin-top:24px;">
        ✅ Payment processed successfully.
    </div>

    <!-- Admin stats -->
    <div th:if="${userRole == 'ADMIN'}">
        <p class="section-label">Payment Overview</p>
        <div class="grid grid-cols-4 gap-4" style="margin-bottom:32px;">
            <div class="stat-card">
                <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}"></div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${completedCount}"></div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${pendingCount}"></div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${totalCount}"></div>
                <div class="stat-label">Total Payments</div>
            </div>
        </div>
    </div>

    <!-- Title bar -->
    <div class="flex justify-between items-center" style="margin-bottom:20px; margin-top: 16px;">
        <div>
            <h1 style="font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:white; letter-spacing:1px;"
                th:text="${userRole == 'ADMIN'} ? 'All Payments' : 'My Payments'"></h1>
        </div>
        <input type="text" class="search-input" placeholder="Search payments..." id="searchInput" onkeyup="filterTable()"/>
    </div>

    <!-- Table -->
    <div class="table-card">
        <table id="paymentTable">
            <thead>
            <tr>
                <th>Payment ID</th>
                <th>Booking</th>
                <th th:if="${userRole == 'ADMIN'}">User ID</th>
                <th>Amount</th>
                <th>Card</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="payment : ${payments}">
                <td style="color:#555; font-size:11px;" th:text="${payment.paymentId}"></td>
                <td th:text="${payment.bookingId}"></td>
                <td th:if="${userRole == 'ADMIN'}" th:text="${payment.userId}"></td>
                <td style="color:white; font-weight:600;" th:text="'$' + ${payment.amount}"></td>
                <td>
                        <span class="card-chip">
                            <span th:text="${payment.cardType}"></span>
                            ••••<span th:text="${payment.cardLastFour}"></span>
                        </span>
                </td>
                <td>
                        <span th:classappend="${payment.status == 'COMPLETED'} ? 'badge-completed' : (${payment.status == 'PENDING'} ? 'badge-pending' : 'badge-failed')"
                              th:text="${payment.status}"></span>
                </td>
                <td style="color:#555; font-size:12px;" th:text="${payment.paymentDate}"></td>
                <td>
                    <div style="display:flex; gap:6px;">
                        <a th:href="@{/payments/{id}(id=${payment.paymentId})}" class="action-btn btn-view">View</a>
                        <a th:if="${userRole == 'ADMIN'}" th:href="@{/payments/{id}/edit(id=${payment.paymentId})}" class="action-btn btn-edit">Edit</a>
                        <form th:if="${userRole == 'ADMIN'}" th:action="@{/payments/{id}/delete(id=${payment.paymentId})}" method="post"
                              onsubmit="return confirm('Delete this payment?')">
                            <button type="submit" class="action-btn btn-delete">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(payments)}"
             style="text-align:center; padding:48px; color:#555; font-size:14px;">
            No payments found.
        </div>
    </div>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#paymentTable tbody tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
