<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail - CinemaBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0a0a; color: #c8c8c8; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
        header { background: #0a0a0a; border-bottom: 1px solid #2a2a2a; position: relative; }
        header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, #e8192c, transparent); }
        .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: white; }
        .logo-accent { color: #e8192c; }
        .logo-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-top: 1px; }
        .nav-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .nav-btn:hover { border-color: #e8192c; color: #e8192c; }
        .detail-card { background: #111; border: 1px solid #2a2a2a; border-radius: 14px; padding: 36px; }
        .receipt-header { text-align: center; padding-bottom: 24px; border-bottom: 1px dashed #2a2a2a; margin-bottom: 28px; }
        .receipt-amount { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: white; }
        .receipt-amount span { color: #e8192c; }
        .badge-completed { background: rgba(34,197,94,0.1); color: #22c55e; padding: 5px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-pending { background: rgba(234,179,8,0.1); color: #eab308; padding: 5px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-failed { background: rgba(232,25,44,0.1); color: #e8192c; padding: 5px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #555; }
        .detail-value { font-size: 14px; color: #c8c8c8; font-weight: 500; }
        .card-display { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .card-type { font-size: 12px; font-weight: 600; color: #e8192c; }
        .card-num { font-family: 'Courier New', monospace; font-size: 13px; color: #888; }
        .actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-edit { padding: 10px 24px; background: rgba(232,25,44,0.1); color: #e8192c; border: 1px solid rgba(232,25,44,0.3); border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }
        .btn-delete { padding: 10px 24px; background: transparent; color: #e8192c; border: 1px solid #e8192c; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-delete:hover { background: #e8192c; color: white; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #555; letter-spacing: 2px; margin: 24px 0 12px; }
    </style>
</head>
<body style="position:relative; z-index:1;">

<header class="px-6 py-4">
    <div class="max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <div class="logo-title">Cinema<span class="logo-accent">Book</span></div>
            <div class="logo-sub">Payment Receipt</div>
        </div>
        <div class="flex items-center gap-4">
            <a th:href="${userRole == 'ADMIN'} ? '/payments' : '/payments/my'" class="nav-btn">← Back</a>
            <a href="/logout" class="nav-btn">Logout</a>
        </div>
    </div>
</header>

<div class="max-w-2xl mx-auto px-4 py-10" style="position:relative; z-index:1;">
    <div class="detail-card" th:if="${payment != null}">

        <!-- Receipt header -->
        <div class="receipt-header">
            <div style="font-size:11px; text-transform:uppercase; letter-spacing:3px; color:#555; margin-bottom:12px;">Payment Receipt</div>
            <div class="receipt-amount"><span>$</span><span th:text="${payment.amount}"></span></div>
            <div style="margin-top:12px;">
                <span th:classappend="${payment.status == 'COMPLETED'} ? 'badge-completed' : (${payment.status == 'PENDING'} ? 'badge-pending' : 'badge-failed')"
                      th:text="${payment.status}"></span>
            </div>
            <div style="font-size:12px; color:#555; margin-top:10px;" th:text="${payment.paymentDate}"></div>
        </div>

        <!-- Details -->
        <div class="section-title">Transaction Details</div>
        <div class="detail-row">
            <span class="detail-label">Payment ID</span>
            <span class="detail-value" style="font-size:12px; color:#555;" th:text="${payment.paymentId}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Booking ID</span>
            <span class="detail-value" th:text="${payment.bookingId}"></span>
        </div>
        <div th:if="${userRole == 'ADMIN'}" class="detail-row">
            <span class="detail-label">User ID</span>
            <span class="detail-value" th:text="${payment.userId}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Payment Method</span>
            <span class="detail-value" th:text="${payment.paymentMethod}"></span>
        </div>

        <div class="section-title">Card Details</div>
        <div class="card-display">
            <div>
                <div class="card-type" th:text="${payment.cardType}"></div>
                <div class="card-num">•••• •••• •••• <span th:text="${payment.cardLastFour}"></span></div>
            </div>
            <div style="margin-left:auto; font-size:12px; color:#555;" th:text="${payment.cardHolderName}"></div>
        </div>

        <!-- Admin actions -->
        <div th:if="${userRole == 'ADMIN'}" class="actions">
            <a th:href="@{/payments/{id}/edit(id=${payment.paymentId})}" class="btn-edit">Edit Payment</a>
            <form th:action="@{/payments/{id}/delete(id=${payment.paymentId})}" method="post"
                  onsubmit="return confirm('Delete this payment?')">
                <button type="submit" class="btn-delete">Delete</button>
            </form>
        </div>
    </div>

    <div th:if="${payment == null}"
         style="text-align:center; padding:60px; color:#555;">
        Payment not found or you don't have permission to view it.
    </div>
</div>
</body>
</html>
