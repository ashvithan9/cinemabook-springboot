<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment - CinemaBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0a0a; color: #c8c8c8; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
        header { background: #0a0a0a; border-bottom: 1px solid #2a2a2a; position: relative; }
        header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, #e8192c, transparent); }
        .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: white; }
        .logo-accent { color: #e8192c; }
        .logo-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-top: 1px; }
        .nav-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .nav-btn:hover { border-color: #e8192c; color: #e8192c; }
        .form-card { background: #111; border: 1px solid #2a2a2a; border-radius: 14px; padding: 36px; }
        .credit-card-preview { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); border: 1px solid #3a3a3a; border-radius: 14px; padding: 24px; margin-bottom: 28px; position: relative; overflow: hidden; height: 180px; }
        .credit-card-preview::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(232,25,44,0.08); border-radius: 50%; }
        .credit-card-preview::after { content: ''; position: absolute; bottom: -60px; left: -20px; width: 180px; height: 180px; background: rgba(232,25,44,0.04); border-radius: 50%; }
        .card-chip-icon { width: 36px; height: 28px; background: linear-gradient(135deg, #d4a843, #b8860b); border-radius: 5px; margin-bottom: 20px; }
        .card-number-preview { font-family: 'Courier New', monospace; font-size: 18px; color: white; letter-spacing: 4px; margin-bottom: 16px; }
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .card-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 4px; }
        .card-value { font-size: 13px; color: #c8c8c8; font-weight: 500; }
        .card-type-badge { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: #e8192c; letter-spacing: 1px; }
        .section-divider { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }
        label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 8px; }
        input, select { width: 100%; padding: 11px 14px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #c8c8c8; border-radius: 8px; font-size: 14px; margin-bottom: 18px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: #e8192c; }
        select option { background: #111; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e8192c, #b01020); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: white; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }
        .amount-display { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .amount-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #e8192c; }
    </style>
</head>
<body style="position:relative; z-index:1;">

<header class="px-6 py-4">
    <div class="max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <div class="logo-title">Cinema<span class="logo-accent">Book</span></div>
            <div class="logo-sub">Secure Payment</div>
        </div>
        <div class="flex items-center gap-4">
            <a href="/payments/my" class="nav-btn">← Back</a>
            <a href="/logout" class="nav-btn">Logout</a>
        </div>
    </div>
</header>

<div class="max-w-2xl mx-auto px-4 py-10" style="position:relative; z-index:1;">
    <div class="form-card">

        <!-- Card Preview -->
        <div class="credit-card-preview" id="cardPreview">
            <div class="card-chip-icon"></div>
            <div class="card-number-preview" id="previewNumber">•••• •••• •••• ••••</div>
            <div class="card-bottom">
                <div>
                    <div class="card-label">Card Holder</div>
                    <div class="card-value" id="previewName">YOUR NAME</div>
                </div>
                <div style="text-align:right;">
                    <div class="card-label">Expires</div>
                    <div class="card-value" id="previewExpiry">MM/YY</div>
                </div>
                <div class="card-type-badge" id="previewType">VISA</div>
            </div>
        </div>

        <form th:action="${isEdit != null and isEdit} ? @{/payments/{id}/edit(id=${payment.paymentId})} : @{/payments}"
              th:object="${payment}" method="post">

            <!-- Amount -->
            <div class="amount-display">
                <div>
                    <div style="font-size:11px; text-transform:uppercase; letter-spacing:2px; color:#555;">Amount Due</div>
                    <div class="amount-value" th:text="'$' + ${payment.amount}"></div>
                </div>
                <div style="font-size:12px; color:#555;">Booking: <span style="color:#c8c8c8;" th:text="${payment.bookingId}"></span></div>
            </div>

            <input type="hidden" th:field="*{bookingId}"/>
            <input type="hidden" th:field="*{amount}"/>

            <!-- Card Details -->
            <div class="section-title">Card Details</div>

            <div class="grid-2">
                <div>
                    <label>Card Type</label>
                    <select th:field="*{cardType}" onchange="updatePreview()">
                        <option value="VISA">Visa</option>
                        <option value="MASTERCARD">Mastercard</option>
                        <option value="AMEX">Amex</option>
                    </select>
                </div>
                <div>
                    <label>Payment Method</label>
                    <select th:field="*{paymentMethod}">
                        <option value="CREDIT">Credit Card</option>
                        <option value="DEBIT">Debit Card</option>
                    </select>
                </div>
            </div>

            <label>Card Holder Name</label>
            <input type="text" th:field="*{cardHolderName}" placeholder="John Doe"
                   oninput="document.getElementById('previewName').innerText = this.value || 'YOUR NAME'" required/>

            <label>Card Number</label>
            <input type="text" id="cardNumberInput" th:field="*{cardLastFour}"
                   placeholder="1234 5678 9012 3456" maxlength="19"
                   oninput="formatCardNumber(this)" required/>

            <div class="grid-2">
                <div>
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY" maxlength="5"
                           oninput="formatExpiry(this); document.getElementById('previewExpiry').innerText = this.value || 'MM/YY'" required/>
                </div>
                <div>
                    <label>CVV</label>
                    <input type="password" placeholder="•••" maxlength="4" required/>
                </div>
            </div>

            <hr class="section-divider"/>

            <!-- Admin status edit -->
            <div th:if="${isEdit}">
                <div class="section-title">Payment Status</div>
                <label>Status</label>
                <select th:field="*{status}">
                    <option value="COMPLETED">Completed</option>
                    <option value="PENDING">Pending</option>
                    <option value="FAILED">Failed</option>
                </select>
                <label>Payment Date</label>
                <input type="text" th:field="*{paymentDate}" placeholder="2024-01-01 14:30"/>
            </div>

            <button type="submit" class="submit-btn"
                    th:text="${isEdit} ? 'Update Payment' : '🔒 Pay Now'"></button>
        </form>
    </div>
</div>

<script>
    function formatCardNumber(input) {
        let value = input.value.replace(/\D/g, '').substring(0, 16);
        input.value = value.replace(/(.{4})/g, '$1 ').trim();
        const digits = value.replace(/\s/g, '');
        const last4 = digits.length > 0 ? '•••• •••• •••• ' + digits.slice(-4).padStart(4, '•') : '•••• •••• •••• ••••';
        document.getElementById('previewNumber').innerText = digits.length >= 4
            ? '•••• •••• •••• ' + digits.slice(-4)
            : '•••• •••• •••• ••••';
    }

    function formatExpiry(input) {
        let value = input.value.replace(/\D/g, '').substring(0, 4);
        if (value.length >= 2) value = value.substring(0, 2) + '/' + value.substring(2);
        input.value = value;
    }

    function updatePreview() {
        const type = document.querySelector('[name="cardType"]').value;
        document.getElementById('previewType').innerText = type;
    }
</script>
</body>
</html>
